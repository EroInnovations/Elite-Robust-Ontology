<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance</title>
    <!--Development Zone-->

    <script src="../Development/"></script>

    <!---->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .LoadedImage{
            position: absolute;
            width: 300px;
            height: 300px;
            
        }

        body{
            color: #fff;
            background: #000;
        }

        .body{
            position: fixed;
            left: 0;
            right: 0;
            top:0;
            bottom: 0;
            overflow: hidden;
            text-align: center;
            font-size: 20px;
            font-family: sans-serif;
            width: 100%;
            height: 100%;
            margin: auto;
            padding: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    
        .loader-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-container img {
            position: relative;
            z-index: 10;
            width: 150px;
        }

        .wave {
            position: absolute;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            background: linear-gradient(to left, #029c0250, #ff000030, #0000ff50, #80008050);
            animation: waveAnimation 2s infinite;
            z-index: 1;
            opacity: 50;
        }

        .wave:nth-child(2) {
            animation-duration: 2.5s;
            animation-delay: 0.5s;
            width: 300px;
            height: 300px;
        }

        .wave:nth-child(3) {
            animation-duration: 3s;
            animation-delay: 1s;
            width: 400px;
            height: 400px;
        }

        @keyframes waveAnimation {
            0% {
                transform: scale(0);
                opacity: 0.7;
            }
            50% {
                transform: scale(1);
                opacity: 0.4;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        .load{
            position: absolute;
            font-size: 30px;
            background: transparent;
            width: 100%;
            height: 50px;
            display: inline-flex;
            bottom: 50px;
        }
        .LoaderText{
            margin: auto;
            color: #14307c;
        }
    </style>
</head>
<body>
    <div class="body">
       <div class="loader-container">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>
        <div class="load">
            <p class="LoaderText">Please Wait</p>
        </div>
    </div>
</body>
